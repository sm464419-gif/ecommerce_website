{% extends 'base.html' %}
{% block body %}

<section id="form" style="margin-left:30%"><!--form-->
		<div class="container">
			<div class="col-sm-4 col-sm-offset-1">
                <div class="Signup-form"><!--Signup form-->
						<h2>New password</h2>
                         {% if validlink %}
                        <form method="post">

                            {% csrf_token %}
                            {% for field in form %}
                            {{ field.errors }}
                            <label>{{field.label_tag}}</label>
                            <p> {{field}}</p>
                            {% endfor %}
                         <a href="#" style="float:right; ">Forget Password?</a> <br>


							<button class="btn btn - default" type="Submit">Save</button>

						</form>
                     <p style="color: red">Invalid Token</p>
                    <p>
                        <a href="{% url 'password_reset' %}">
                            Request a new password reset taken
                        </a>

                    </p>
                            {% endif %}
					</div><!--/Signup form-->

			</div>
		</div>
	</section><!--/form-->









{% endblock %}

{% extends 'base.html' %}
{% block body %}

<section id="form" style="margin-left:30%"><!--form-->
		<div class="container">
			<div class="col-sm-4 col-sm-offset-1">
                <div class="Signup-form"><!--Signup form-->
						<h2>Reset Password</h2>
                        <form method="post">

                            {% csrf_token %}
                            {% for field in form %}
                            {{ field.errors }}
                            <label>{{field.label_tag}}</label>
                            <p> {{field}}</p>
                            {% endfor %}

							<button class="btn btn - default" type="Submit">Send confirmation link</button>

						</form>
					</div><!--/Signup form-->

			</div>
		</div>
	</section><!--/form-->









{% endblock %}

{% extends 'base.html' %}
{% block body %}

<section id="form" style="margin-left:30%"><!--form-->
		<div class="container">
			<div class="col-sm-4 col-sm-offset-1">
                <div class="Signup-form"><!--Signup form-->
						<h2>New user signup</h2>
                        <form method="post">

                            {% csrf_token %}
                            {% for field in form %}
                            {{ field.errors }}
                            <p> {{field}}</p>
                            {% endfor %}

							<button class="btn btn-default" type="submit">Signup</button><br>
                            <span style="margin-left:80px;">Already have an account</span>&nbsp;<a href="{% url 'login' %}">Login</a>
						</form>
					</div><!--/Signup form-->

			</div>
		</div>
	</section><!--/form-->









{% endblock %}
